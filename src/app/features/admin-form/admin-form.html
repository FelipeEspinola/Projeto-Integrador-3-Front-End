<div class="container mt-4 custom-form">

  <mat-card class="form-card">

    <!-- TOPO -->
    <div class="topo">
      <img src="assets/imagens/logo.png" class="logo">

      <button mat-stroked-button class="btn-logout">
        Logout →
      </button>
    </div>

    <h2>{{ editando ? 'Editar Produto' : 'Novo Produto' }}</h2>

    <!-- NOME -->
    <mat-form-field class="w-100 custom-field">
      <mat-label>Nome</mat-label>
      <input matInput [(ngModel)]="produto.produtos_nome">
    </mat-form-field>

    <!-- DESCRIÇÃO -->
    <mat-form-field class="w-100 custom-field descricao">
      <mat-label>Descrição</mat-label>
      <textarea matInput rows="3" [(ngModel)]="produto.descricao"></textarea>
    </mat-form-field>

    <!-- PREÇO -->
    <mat-form-field class="w-100 custom-field">
      <mat-label>Preço</mat-label>
      <input matInput type="number" [(ngModel)]="produto.preco">
    </mat-form-field>

    <!-- IMAGEM -->
    <mat-form-field class="w-100 custom-field">
      <mat-label>ImagemURL</mat-label>
      <input matInput [(ngModel)]="produto.imagem_url">
    </mat-form-field>

    <!-- CATEGORIA -->
    <mat-form-field class="w-100 custom-field">
      <mat-label>Categoria</mat-label>
      <mat-select [(ngModel)]="produto.categoria_id">

        <mat-option [value]="1">Ofertas</mat-option>
        <mat-option [value]="2">Carnes</mat-option>
        <mat-option [value]="3">Frango</mat-option>
        <mat-option [value]="4">Acompanhamentos</mat-option>
        <mat-option [value]="5">Bebidas</mat-option>
        <mat-option [value]="6">Sobremesas</mat-option>

      </mat-select>
    </mat-form-field>

    <!-- STATUS + PROMOÇÃO -->
    <div class="linha-dupla">

      <!-- STATUS (novo) -->
      <mat-form-field class="custom-field pequeno">
        <mat-label>Status</mat-label>
        <mat-select [(ngModel)]="produto.status">

          <mat-option [value]="1">Ativo</mat-option>
          <mat-option [value]="2">Inativo</mat-option>
          <mat-option [value]="3">Deletado</mat-option>

        </mat-select>
      </mat-form-field>

      

    </div>

    <!-- PREVIEW -->
    <div class="preview" *ngIf="produto.imagem_url">
      <img [src]="produto.imagem_url">
    </div>

    <!-- BOTÕES -->
    <div class="botoes">

      <button mat-stroked-button class="btn-voltar" routerLink="/admin">
        ← Voltar
      </button>

      <button mat-raised-button class="btn-salvar" (click)="salvar()">
        Salvar 💾
      </button>

    </div>

  </mat-card>

</div>
