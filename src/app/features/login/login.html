<div class="admin-container">

  <!-- LOGO TOPO -->
  <img src="assets/imagens/logo.png" class="logo-top">

  <!-- CARD LOGIN -->
  <div class="login-box">

    <img src="assets/imagens/logo.png" class="logo-center">

    <div class="form-group">
      <label>LOGIN:</label>
      <input matInput [(ngModel)]="usuario" class="input-custom">
    </div>

    <div class="form-group">
      <label>SENHA:</label>
      <input matInput type="password" [(ngModel)]="senha" class="input-custom">
    </div>

    <button class="btn-login" (click)="entrar()">
      Iniciar Seção
    </button>

    <p class="forgot">
      Esqueceu a senha?
      <span>Clique aqui</span>
    </p>

  </div>

  <!-- BOTÃO VOLTAR -->
  <button class="btn-voltar" (click)="voltar()">
  ← Voltar
</button>

</div>
