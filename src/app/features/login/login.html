<div class="admin-container">

  <img src="assets/imagens/logo.png" class="logo-top">

  <div class="login-box">

    <img src="assets/imagens/logo.png" class="logo-center">

    <div class="form-group">
      <label>LOGIN:</label>
      <input matInput [(ngModel)]="usuario" class="input-custom" autocomplete="username">
    </div>

    <div class="form-group">
      <label>SENHA:</label>
      <input matInput type="password" [(ngModel)]="senha" class="input-custom"
             autocomplete="current-password" (keyup.enter)="entrar()">
    </div>

    <!-- mensagem de erro inline, sem alert() -->
    <p class="msg-erro" *ngIf="erro">{{ erro }}</p>

    <button class="btn-login" (click)="entrar()" [disabled]="carregando">
      {{ carregando ? 'Aguarde...' : 'Iniciar Sessão' }}
    </button>

    <p class="forgot">Esqueceu a senha? <span>Clique aqui</span></p>

  </div>

  <button class="btn-voltar" (click)="voltar()">← Voltar</button>

</div>
