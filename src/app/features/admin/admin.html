<div class="container mt-4 custom-admin">

  <div class="topo">
    <h2>Admin - Produtos</h2>

    <div class="topo-direita">

      <!-- FILTRO -->
      <input 
        type="text"
        placeholder="Buscar produto..."
        class="input-filtro"
        [(ngModel)]="filtro"
        (ngModelChange)="filtrar()"
      />

      <button mat-raised-button color="primary" class="btn-produto" (click)="novo()">
        Novo Produto
      </button>

      <button mat-stroked-button color="warn" class="btn-logout" (click)="logout()">
        Logout
      </button>

    </div>
  </div>

  <div class="lista">

    <div class="card-produto" *ngFor="let p of produtos">

      <img [src]="p.imagemUrl" alt="Produto">

      <div class="info">

        <h3>{{ p.nome }}</h3>

        <p class="descricao">
          {{ p.descricao }}
        </p>

        <p><strong>Preço:</strong> R$ {{ p.preco }}</p>

        <p><strong>Categoria:</strong> {{ p.categoriaId }}</p>

        <p>
          <strong>Status:</strong>
          <span [ngClass]="getStatusClass(p.status)">
            {{ getStatusTexto(p.status) }}
          </span>
        </p>

        <p *ngIf="p.promocao" class="promo">
          🔥 Em promoção 
        </p>

      </div>

      <div class="acoes">

        <button mat-icon-button (click)="editar(p)">
          <mat-icon>edit</mat-icon>
        </button>

        <button mat-icon-button color="warn" (click)="deletar(p)">
          <mat-icon>delete</mat-icon>
        </button>

      </div>

    </div>

  </div>

</div>
