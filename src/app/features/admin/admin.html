<div class="container mt-4 custom-admin">

  <div class="topo">
    <h2>Admin - Produtos</h2>

    <div class="topo-direita">

      <!-- FILTRO -->
      <input 
        type="text"
        placeholder="Buscar produto..."
        class="input-filtro"
        [(ngModel)]="filtro"
        (input)="filtrar()"
      />

      <button mat-raised-button color="primary" class="btn-produto" (click)="novo()">
        Novo Produto
      </button>

      <button mat-stroked-button color="warn" class="btn-logout" (click)="logout()">
        Logout
      </button>

    </div>
  </div>

  <!-- LOADING -->
  <div *ngIf="carregando" class="loading">
    Carregando produtos...
  </div>

  <!-- LISTA -->
  <div class="lista" *ngIf="!carregando && produtos.length > 0">

    <div class="card-produto" *ngFor="let p of produtos">

      <img [src]="p.imagemUrl || 'assets/imagens/sem-imagem.png'" alt="Produto">

      <div class="info">

        <h3>{{ p.nome }}</h3>

        <p class="descricao">
          {{ p.descricao }}
        </p>

        <p>
          <strong>Preço:</strong> 
          {{ p.preco | currency:'BRL':'symbol':'1.2-2' }}
        </p>

        <p><strong>Categoria:</strong> {{ p.categoriaId }}</p>

        <p>
          <strong>Status:</strong>
          <span *ngIf="p.status === 1" class="ativo">Ativo</span>
          <span *ngIf="p.status === 0" class="inativo">Inativo</span>
          <span *ngIf="p.status === -1" class="deletado">Deletado</span>
        </p>

      </div>

      <div class="acoes">

        <button mat-icon-button color="primary" (click)="editar(p)">
          <mat-icon>edit</mat-icon>
        </button>

        <button mat-icon-button color="warn" (click)="deletar(p)">
          <mat-icon>delete</mat-icon>
        </button>

      </div>

    </div>

  </div>

  <!-- SEM RESULTADO -->
  <div *ngIf="!carregando && produtos.length === 0" class="sem-resultados">
    Nenhum produto encontrado.
  </div>

</div>
