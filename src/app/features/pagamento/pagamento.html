<div class="pagamento-container">

  <!-- LOGO -->
  <div class="logo">
    <img src="assets/imagens/logo.png" alt="Logo">
  </div>

  <!-- TÍTULO -->
  <h1 class="titulo">Como você gostaria de pagar?</h1>

  <!-- OPÇÕES -->
  <div class="opcoes">

    <div
      class="opcao"
      [class.ativo]="metodoSelecionado === 'pix'"
      (click)="pagar('pix')">

      <span class="icone">🔶</span>
      <span class="texto">Pix</span>
    </div>

    <div
      class="opcao"
      [class.ativo]="metodoSelecionado === 'cartao'"
      (click)="pagar('cartao')">

      <span class="icone">💳</span>
      <span class="texto">Cartão</span>
    </div>

    <div
      class="opcao"
      [class.ativo]="metodoSelecionado === 'dinheiro'"
      (click)="pagar('dinheiro')">

      <span class="icone">💰</span>
      <span class="texto">Dinheiro</span>
    </div>

  </div>

  <!-- AÇÕES -->
  <div class="acoes">

    <button class="btn-voltar" routerLink="/sacola">
      ← Voltar
    </button>

    <button class="btn-cancelar" (click)="cancelarPedido()">
      ✖ Cancelar Pedido
    </button>

  </div>

</div>
