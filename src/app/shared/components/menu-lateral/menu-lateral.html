<div class="menu">

  <div
    *ngFor="let cat of categorias"
    (click)="selecionar(cat.id)"
    [class.active]="cat.id === categoriaAtiva"
    class="menu-item">

    <img [src]="cat.icone">
    <span>{{ cat.nome }}</span>

  </div>

  <!-- BOTÃO CANCELAR -->
  <div class="menu-item cancelar" (click)="cancelarPedido()">
    <span>✖ Cancelar Pedido</span>
  </div>

</div>
