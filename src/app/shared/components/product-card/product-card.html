<div class="card" (click)="adicionar()">

  <img [src]="produto.imagemUrl" class="img">

  <div class="nome">
    {{ produto.nome }}
  </div>

  <div class="descricao">
    {{ produto.descricao }}
  </div>

  <div class="linha"></div>

  <div class="preco">
    <span>a partir </span>
    <strong>R$ {{ produto.preco}}</strong>
  </div>

</div>
